name: Continuous Integration

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        # Kita membangun image produksi kita dan memberinya tag 'rag-api-ci'
        # agar tidak bentrok dengan tag lokal
        run: docker build -t rag-api-ci .

      - name: Create .env file for testing
        # Langkah ini membuat file .env sementara di runner CI
        # dengan menggunakan secrets yang sudah kita simpan di GitHub
        run: |
          echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" >> .env.ci
          # Tambahkan kunci lain jika tes Anda membutuhkannya
          # echo "COHERE_API_KEY=${{ secrets.COHERE_API_KEY }}" >> .env.ci
      
      - name: Run tests inside Docker container
        # Kita menjalankan container dari image yang baru dibangun,
        # menyuntikkan file .env.ci, dan menjalankan perintah pytest di dalamnya.
        run: |
          docker run --env-file .env.ci rag-api-ci python -m pytest
